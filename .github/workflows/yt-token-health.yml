name: YT OAuth Token Health

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe refresh token grant
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          set -u
          if [ -z "$YT_CLIENT_ID" ] || [ -z "$YT_CLIENT_SECRET" ] || [ -z "$YT_REFRESH_TOKEN" ]; then
            echo "::error::Required YT secrets unset"
            exit 1
          fi
          response=$(curl -sS -w "\n__HTTP__:%{http_code}" -X POST \
            --data-urlencode "client_id=$YT_CLIENT_ID" \
            --data-urlencode "client_secret=$YT_CLIENT_SECRET" \
            --data-urlencode "refresh_token=$YT_REFRESH_TOKEN" \
            --data-urlencode "grant_type=refresh_token" \
            https://oauth2.googleapis.com/token)
          http_code=$(printf "%s" "$response" | grep "^__HTTP__:" | cut -d: -f2)
          body=$(printf "%s" "$response" | sed '/^__HTTP__:/d')
          case "$http_code" in
            200)
              echo "Token healthy. Sunday cron will succeed."
              ;;
            400|401)
              err=$(printf "%s" "$body" | python3 -c "import json,sys;print(json.load(sys.stdin).get('error','?'))" 2>/dev/null || echo unknown)
              echo "::error::YT refresh token grant failed (HTTP $http_code, error=$err). Run yt-remint.mjs locally to re-mint."
              echo "Response body:"
              printf "%s\n" "$body"
              exit 1
              ;;
            5*)
              echo "::warning::Google returned HTTP $http_code. Likely transient, not alerting."
              ;;
            *)
              echo "::error::Unexpected HTTP $http_code from Google."
              printf "%s\n" "$body"
              exit 1
              ;;
          esac
