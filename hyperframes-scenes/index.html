<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          rgb(15, 23, 42),
          rgb(17, 24, 39),
          rgb(23, 37, 84)
        );
        font-family: "Inter", system-ui, sans-serif;
        color: #fff;
      }
      .property-label {
        position: absolute;
        top: 60px;
        left: 80px;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 22px;
        color: #ffd700;
        letter-spacing: 6px;
        text-transform: uppercase;
      }
      .tease {
        position: absolute;
        left: 80px;
        right: 80px;
        bottom: 140px;
        padding: 56px 64px;
        background: rgba(0, 0, 0, 0.78);
        border: 2px solid #ffd700;
        border-radius: 28px;
        backdrop-filter: blur(8px);
      }
      .tease-index {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 24px;
        color: #ffd700;
        letter-spacing: 6px;
        text-transform: uppercase;
        margin-bottom: 20px;
      }
      .tease-title {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 76px;
        line-height: 1.05;
        margin-bottom: 24px;
      }
      .tease-hook {
        font-family: "Inter", sans-serif;
        font-size: 36px;
        line-height: 1.4;
        color: rgba(255, 255, 255, 0.78);
      }
      .url-strip {
        position: absolute;
        bottom: 56px;
        left: 80px;
        right: 80px;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 28px;
        color: #ffd700;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="property-label"
        class="clip property-label"
        data-start="0"
        data-duration="6"
        data-track-index="1"
      >
        News digest / Week 17
      </div>

      <div
        id="tease"
        class="clip tease"
        data-start="0.4"
        data-duration="5.2"
        data-track-index="2"
      >
        <div class="tease-index">01 / Tease</div>
        <div id="tease-title" class="tease-title">
          Sample story headline goes here
        </div>
        <div id="tease-hook" class="tease-hook">
          A short tease that makes you want to click through and read the full
          story this week at blkoutuk.com.
        </div>
      </div>

      <div
        id="url-strip"
        class="clip url-strip"
        data-start="1.2"
        data-duration="4.8"
        data-track-index="3"
      >
        Read at blkoutuk.com/news
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#property-label", { opacity: 0, x: -30, duration: 0.6, ease: "power2.out" }, 0);
      tl.from("#tease", { opacity: 0, y: 60, duration: 0.7, ease: "power3.out" }, 0.4);
      tl.from("#tease-title", { opacity: 0, y: 30, duration: 0.6, ease: "power2.out" }, 0.7);
      tl.from("#tease-hook", { opacity: 0, y: 20, duration: 0.6, ease: "power2.out" }, 1.0);
      tl.from("#url-strip", { opacity: 0, y: 20, duration: 0.5, ease: "power2.out" }, 1.2);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
